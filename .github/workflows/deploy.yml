# Builds the static export and deploys it to GitHub Pages.
#
# IMPORTANT — repository layout:
# This Next.js project lives in the `captionforge-app/` subfolder of the
# `AI-Clipping-Tools` repo, so every step runs with that working directory and
# the Pages artifact is uploaded from `captionforge-app/out`.
#
# If you ever rename the repo, update `repositoryName` in next.config.ts and
# `REPO_NAME` in lib/basePath.ts so the base path matches the new Pages URL.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify out/index.html exists
        run: test -f out/index.html && echo "out/index.html present"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
        path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
